<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#030812">
<meta name="pvl-version" content="4.5.2">
<meta name="description" content="交互物理实验、动态推导与可搭建电路分析工作台。">
<title>物理可视化实验室 v4.5.2</title>
<link rel="stylesheet" href="styles.css?v=4.2.1-hotfix">
<link rel="stylesheet" href="pvl-overhaul-v4.4.1.css?v=4.4.1">
<link rel="stylesheet" href="pvl-product-v4.5.1.css?v=4.5.1">
<script>
try{
  if(localStorage.getItem("physics-visual-lab-theme")==="day"){
    document.documentElement.dataset.theme="day";
  }
}catch{}
</script>
</head>
<body class="app-booting" data-route="home">
<div id="root"></div>
<script type="module" src="larmor.js?v=4.2.1-hotfix"></script>
<script src="stern-gerlach.js?v=4.2.1-hotfix"></script>
<script src="full-locales.js?v=4.2.1-hotfix"></script>
<script src="catalog-locales.js?v=4.2.1-hotfix"></script>
<script src="circuit-workbench.js?v=4.2.1-hotfix"></script>
<script src="ja-content.js?v=4.2.1-hotfix"></script>
<script src="app.js?v=4.2.1-hotfix"></script>
<script src="i18n.js?v=4.2.1-hotfix"></script>
<script src="pvl-overhaul-v4.4.1.js?v=4.4.1"></script>
<script src="pvl-product-v4.5.1.js?v=4.5.1"></script>
<script>
(() => {
  "use strict";
  const VERSION = "4.5.2";

  function syncVersion() {
    document.querySelectorAll(".pvl-version-badge").forEach((el) => {
      el.textContent = `v${VERSION}`;
      el.title = `Release ${VERSION} · 2026-07-15`;
    });

    const meta = document.querySelector('meta[name="pvl-version"]');
    if (meta) meta.content = VERSION;

    document.title = `物理可视化实验室 v${VERSION}`;
    document.documentElement.dataset.pvlVersion = VERSION;
  }

  function start() {
    syncVersion();
    new MutationObserver(syncVersion).observe(document.body, {
      childList: true,
      subtree: true
    });
    window.addEventListener("hashchange", syncVersion);
    window.addEventListener("pvl:languagechange", syncVersion);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", start, { once: true });
  } else {
    start();
  }
})();
</script>
</body>
</html>
